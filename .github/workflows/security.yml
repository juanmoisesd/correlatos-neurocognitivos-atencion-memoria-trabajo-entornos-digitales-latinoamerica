name: Security Scan

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r scripts/
      - name: Run Audit
        run: |
          pip install pip-audit
          pip-audit
